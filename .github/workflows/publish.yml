name: Publish

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi          # GH environment bound to the PyPI trusted publisher
    permissions:
      id-token: write          # OIDC - short-lived PyPI token, no stored secrets
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv build
      - run: uv publish --trusted-publishing always
